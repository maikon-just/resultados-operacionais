<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Just Dashboards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#6d88bf;
      --bg2:#90a9d8;
      --panel:#ffffff;
      --line:#d9e4f4;
      --text:#122033;
      --muted:#64748b;
      --brand:#5f8fff;
      --brand2:#8b6cff;
      --shadow:0 16px 36px rgba(84,104,146,.14);
      --sidebar-expanded:280px;
      --sidebar-collapsed:86px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:'Inter',system-ui,sans-serif;background:linear-gradient(180deg,#f4f8ff 0%,#fbfdff 100%);color:var(--text)}
    .app{min-height:100vh;display:flex}
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-expanded);padding:18px 14px;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);color:#fff;border-right:1px solid rgba(255,255,255,.18);z-index:20;transition:width .25s ease,transform .25s ease;overflow:hidden}
    .sidebar.collapsed{width:var(--sidebar-collapsed)}
    .sidebar-header{display:flex;gap:12px;align-items:center;padding:8px 8px 18px;border-bottom:1px solid rgba(255,255,255,.18);margin-bottom:18px}
    .brand-mark{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#3b82f6,#7c3aed);display:grid;place-items:center;font-weight:800;flex:0 0 42px}
    .brand-copy{display:flex;flex-direction:column;gap:2px;min-width:0;transition:opacity .2s ease}
    .brand-copy strong{font-size:.96rem}
    .brand-copy span{font-size:.78rem;color:rgba(255,255,255,.66)}
    .sidebar.collapsed .brand-copy,.sidebar.collapsed .nav-copy{opacity:0;pointer-events:none}
    .nav{display:flex;flex-direction:column;gap:10px}
    .nav-btn{border:0;background:transparent;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:14px;padding:14px 12px;border-radius:16px;cursor:pointer;text-align:left;transition:.2s ease}
    .nav-btn:hover{background:rgba(255,255,255,.14);color:#fff;transform:translateX(2px)}
    .nav-btn.active{background:linear-gradient(135deg,rgba(95,143,255,.28),rgba(139,108,255,.2));box-shadow:inset 0 0 0 1px rgba(255,255,255,.3);color:#fff}
    .nav-icon{width:34px;text-align:center;font-size:1.15rem;flex:0 0 34px}
    .nav-copy{display:flex;flex-direction:column;gap:3px;transition:opacity .2s ease}
    .nav-copy strong{font-size:.95rem}
    .nav-copy span{font-size:.74rem;color:rgba(255,255,255,.58)}
    .main{width:100%;margin-left:var(--sidebar-expanded);padding:22px;transition:margin-left .25s ease}
    .main.sidebar-collapsed{margin-left:var(--sidebar-collapsed)}
    .topbar{display:flex;justify-content:flex-start;align-items:center;gap:10px;padding:6px 0 12px;background:transparent;border:0;box-shadow:none;margin-bottom:0}
    .topbar-left{display:flex;gap:14px;align-items:center}
    .toggle{width:46px;height:46px;border-radius:14px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:1.15rem;box-shadow:0 8px 20px rgba(15,23,42,.08)}
    .topbar h1{margin:0 0 4px;font-size:1.5rem}
    .topbar p{margin:0;color:var(--muted);font-size:.94rem}
    .top-actions{display:none}
    .top-link{display:none}
    .frame-wrap{height:calc(100vh - 122px);min-height:740px;padding:14px;border-radius:24px;background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.88);box-shadow:var(--shadow)}
    iframe{width:100%;height:100%;border:0;border-radius:18px;background:#fff}
    .sidebar-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.34);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .2s ease;z-index:15}
    @media (max-width:960px){
      .sidebar{width:min(90vw,320px);transform:translateX(-100%);box-shadow:0 20px 50px rgba(15,23,42,.24)}
      .sidebar.open{transform:translateX(0)}
      .sidebar.collapsed{transform:translateX(-100%);width:min(90vw,320px)}
      .sidebar.collapsed .brand-copy,.sidebar.collapsed .nav-copy{opacity:1;pointer-events:auto}
      .sidebar-backdrop.active{opacity:1;pointer-events:auto}
      .main,.main.sidebar-collapsed{margin-left:0;padding:12px}
      .topbar{padding:2px 0 10px}
      .topbar-left{align-items:flex-start}
    }
    @media (max-width:640px){
      .sidebar{width:min(90vw,280px)}
      .sidebar.collapsed{width:min(90vw,280px)}
      .main,.main.sidebar-collapsed{margin-left:0;padding:14px}
      .frame-wrap{min-height:72vh}
      .topbar h1{font-size:1.18rem}
      .topbar p{font-size:.86rem}
      .top-link{width:100%}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar collapsed" id="sidebar">
      <div class="sidebar-header">
        <div class="brand-mark">JB</div>
        <div class="brand-copy">
          <strong>Just Dashboards</strong>
          <span>Painel operacional e financeiro</span>
        </div>
      </div>
      <nav class="nav">
        <button class="nav-btn" data-page="resultados" data-title="Resultados Operacionais" data-description="Análise completa com Negociações, Cancelamentos, Qualidade e Cardápio.">
          <span class="nav-icon">📊</span>
          <span class="nav-copy"><strong>Resultados</strong><span>Análise completa</span></span>
        </button>
        <button class="nav-btn active" data-page="vendaslight" data-title="Vendas Light" data-description="Novo dashboard claro de vendas com datas, ontem, mês atual, mês anterior e projeção automática do mês.">
          <span class="nav-icon">📈</span>
          <span class="nav-copy"><strong>Vendas Light</strong><span>Dashboard oficial</span></span>
        </button>
      </nav>
    </aside>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <main class="main" id="mainContent">
      <header class="topbar">
        <div class="topbar-left">
          <button class="toggle" id="toggleSidebar" aria-label="Alternar menu lateral">☰</button>
        </div>
      </header>
      <section class="frame-wrap">
        <iframe id="contentFrame" src="dashboard-vendas-light.html" title="Vendas Light"></iframe>
      </section>
    </main>
  </div>

  <script>
    const pages = {
      resultados: { src: 'resultados-operacionais.html', href: 'resultados-operacionais.html' },
      vendaslight: { src: 'dashboard-vendas-light.html', href: 'dashboard-vendas-light.html' }
    };
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('mainContent');
    const frame = document.getElementById('contentFrame');
    const sidebarBackdrop = document.getElementById('sidebarBackdrop');

    function isMobileLayout(){
      return window.matchMedia('(max-width: 960px)').matches;
    }

    function syncLayout(){
      const collapsed = sidebar.classList.contains('collapsed');
      main.classList.toggle('sidebar-collapsed', collapsed && !isMobileLayout());
      sidebar.classList.toggle('open', isMobileLayout() && !collapsed);
      sidebarBackdrop.classList.toggle('active', isMobileLayout() && !collapsed);
    }

    function closeSidebarOnMobile(){
      if(!isMobileLayout()) return;
      sidebar.classList.add('collapsed');
      syncLayout();
    }

    function loadPage(key){
      const page = pages[key] || pages.vendaslight;
      frame.src = page.src;

    }

    function setActive(btn){
      document.querySelectorAll('.nav-btn').forEach(node => node.classList.remove('active'));
      btn.classList.add('active');
      document.title = `Just Dashboards · ${btn.dataset.title}`;
      loadPage(btn.dataset.page);
      closeSidebarOnMobile();
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => setActive(btn));
    });

    document.getElementById('toggleSidebar').addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
      syncLayout();
    });
    sidebarBackdrop.addEventListener('click', closeSidebarOnMobile);
    window.addEventListener('resize', syncLayout);

    syncLayout();
    loadPage('vendaslight');
  </script>
</body>
</html>
