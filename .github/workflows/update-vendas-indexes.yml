name: Atualizar índices do dashboard de vendas

on:
  workflow_dispatch:
  schedule:
    - cron: '23 * * * *'

permissions:
  contents: write

jobs:
  build-indexes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gerar índices mensais por loja
        run: |
          node scripts/build-vendas-indexes.mjs data/vendas-index

      - name: Commitar atualização
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/vendas-index vendas-cache-mes-atual.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: atualiza índices do dashboard de vendas"
          git push
