name: Atualizar índices do dashboard de vendas

on:
  workflow_dispatch:
  schedule:
    - cron: '23 * * * *'

permissions:
  contents: write

jobs:
  build-indexes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Gerar índices mensais por loja
        run: |
          python3 scripts/build-vendas-indexes.py data/vendas-index

      - name: Commitar atualização
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/vendas-index vendas-cache-mes-atual.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: atualiza índices do dashboard de vendas"
          git push
