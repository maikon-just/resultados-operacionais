name: Atualizar cache mensal do dashboard de vendas

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

jobs:
  build-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gerar cache do mês atual
        run: node scripts/update-vendas-cache.mjs vendas-cache-mes-atual.json

      - name: Commitar atualização
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vendas-cache-mes-atual.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: atualiza cache mensal do dashboard de vendas"
          git push
